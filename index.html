<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Hóa Đơn Bán Hàng Chuyên Nghiệp</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 480px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { text-align: center; margin-bottom: 20px; color: #2c3e50; font-size: 22px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Giao diện các ô nhập liệu */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; color: #4a5568; }
        .form-group input { width: 100%; padding: 12px; font-size: 15px; border-radius: 6px; border: 1px solid #cbd5e1; outline: none; transition: all 0.2s; }
        .form-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        
        /* Nút bấm */
        button { width: 100%; padding: 14px; margin-top: 10px; font-size: 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn-preview { background-color: #3b82f6; color: white; }
        .btn-preview:hover { background-color: #2563eb; }
        .btn-download { background-color: #10b981; color: white; display: none; margin-top: 20px; }
        .btn-download:hover { background-color: #059669; }
        
        /* Khu vực hiển thị tờ hóa đơn để chụp ảnh */
        #invoice-box {
            background: #ffffff;
            padding: 30px;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            margin-top: 25px;
            text-align: center;
            display: none; /* Ẩn lúc mới vào, chỉ hiện khi bấm xem trước */
        }
        .invoice-header { font-size: 24px; font-weight: 800; color: #1e293b; margin-bottom: 5px; text-transform: uppercase; }
        .invoice-sub { font-size: 13px; color: #64748b; margin-bottom: 20px; }
        
        /* Bảng chi tiết tính tiền bên trong hóa đơn */
        .invoice-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; text-align: left; font-size: 15px; }
        .invoice-table th { padding: 8px 0; border-bottom: 2px solid #edf2f7; color: #718096; font-weight: 600; }
        .invoice-table td { padding: 12px 0; border-bottom: 1px solid #edf2f7; color: #2d3748; }
        .text-right { text-align: right; }
        
        .total-section { text-align: right; margin-top: 10px; padding-top: 10px; font-size: 16px; color: #1a202c; }
        .total-price { font-size: 20px; font-weight: bold; color: #ef4444; }
        
        /* Vùng chứa mã QR */
        .qr-section { margin-top: 20px; padding-top: 15px; border-top: 1px dashed #e2e8f0; }
        .qr-title { font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 10px; }
        .qr-code { width: 190px; height: 190px; object-fit: contain; border: 1px solid #e2e8f0; padding: 6px; background: #fff; border-radius: 4px; }
        .footer-text { font-size: 13px; color: #94a3b8; margin-top: 15px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>TẠO HÓA ĐƠN NHANH</h2>
    
    <div class="form-group">
        <label for="inputName">Tên sản phẩm / mặt hàng:</label>
        <input type="text" id="inputName" placeholder="Ví dụ: Áo khoác Bomber thời trang">
    </div>
    
    <div class="form-group">
        <label for="inputPrice">Đơn giá (VNĐ):</label>
        <input type="number" id="inputPrice" placeholder="Ví dụ: 250000">
    </div>
    
    <div class="form-group">
        <label for="inputQty">Số lượng mua:</label>
        <input type="number" id="inputQty" value="1" min="1" placeholder="Ví dụ: 1">
    </div>

    <button class="btn-preview" onclick="generateInvoice()">✨ Xem trước Hóa Đơn</button>

    <div id="invoice-box">
        <div class="invoice-header">HÓA ĐƠN BÁN HÀNG</div>
        <div class="invoice-sub">Cảm ơn bạn đã ủng hộ shop!</div>
        
        <table class="invoice-table">
            <thead>
                <tr>
                    <th>Tên sản phẩm</th>
                    <th class="text-right" style="width: 70px;">SL</th>
                    <th class="text-right" style="width: 110px;">Thành tiền</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="outName" style="font-weight: 500; word-break: break-word;">...</td>
                    <td id="outQty" class="text-right">0</td>
                    <td id="outSubtotal" class="text-right">0đ</td>
                </tr>
            </tbody>
        </table>
        
        <div class="total-section">
            <p>Tổng thanh toán: <span id="outTotal" class="total-price">0</span> <span style="color: #ef4444; font-weight: bold;">VNĐ</span></p>
        </div>
        
        <div class="qr-section">
            <p class="qr-title">Quét mã QR dưới đây để thanh toán</p>
            <img src="ma-qr-cua-toi.jpg" alt="Mã QR Thanh Toán" class="qr-code">
        </div>
        
        <p class="footer-text">Hóa đơn được khởi tạo tự động</p>
    </div>

    <button id="downloadBtn" class="btn-download" onclick="downloadInvoice()">⬇️ Tải Ảnh Hóa Đơn Về Máy</button>
</div>

<script>
    // Hàm xử lý khi bấm nút "Xem trước Hóa Đơn"
    function generateInvoice() {
        const name = document.getElementById('inputName').value.trim();
        const price = parseFloat(document.getElementById('inputPrice').value);
        const qty = parseInt(document.getElementById('inputQty').value);
        
        // Kiểm tra dữ liệu đầu vào xem đã nhập đủ chưa
        if (!name) {
            alert("Vui lòng nhập tên sản phẩm bạn ơi!");
            return;
        }
        if (isNaN(price) || price <= 0) {
            alert("Vui lòng nhập giá tiền hợp lệ lớn hơn 0 nhé!");
            return;
        }
        if (isNaN(qty) || qty <= 0) {
            alert("Vui lòng nhập số lượng lớn hơn 0 nhé!");
            return;
        }

        // Tính toán số tiền
        const totalAmount = price * qty;

        // Đổ dữ liệu tính toán được vào giao diện tờ hóa đơn ở dưới
        document.getElementById('outName').innerText = name;
        document.getElementById('outQty').innerText = qty;
        document.getElementById('outSubtotal').innerText = totalAmount.toLocaleString('vi-VN') + 'đ';
        document.getElementById('outTotal').innerText = totalAmount.toLocaleString('vi-VN');

        // Hiển thị khung hóa đơn và nút tải ảnh lên màn hình
        document.getElementById('invoice-box').style.style.display = 'block';
        document.getElementById('downloadBtn').style.display = 'block';
        
        // Cuộn nhẹ màn hình xuống dưới để người dùng thấy hóa đơn vừa tạo
        document.getElementById('invoice-box').scrollIntoView({ behavior: 'smooth' });
    }

    // Hàm chụp ảnh vùng hóa đơn và tự động tải xuống
    function downloadInvoice() {
        const invoice = document.getElementById('invoice-box');
        const btn = document.getElementById('downloadBtn');
        
        // Đổi trạng thái nút để người dùng biết hệ thống đang xử lý
        btn.innerText = "⏳ Đang khởi tạo ảnh...";
        btn.style.backgroundColor = "#6b7280";
        btn.disabled = true;
        
        // Tiến hành chụp ảnh thẻ div chứa hóa đơn
        html2canvas(invoice, {
            useCORS: true, 
            scale: 3, // Tăng scale lên 3 để xuất ảnh nét căng, không bị vỡ chữ khi gửi qua Zalo/Facebook
            backgroundColor: "#ffffff" // Đảm bảo nền ảnh luôn là màu trắng sạch sẽ
        }).then(canvas => {
            // Tạo link tải ảnh ngầm
            const link = document.createElement('a');
            // Tự động đặt tên file ảnh tải về theo tên sản phẩm cho dễ quản lý
            const fileNameStr = document.getElementById('inputName').value.trim().replace(/\s+/g, '-');
            link.download = `HD-${fileNameStr || 'Thanh-Toan'}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            // Khôi phục lại trạng thái nút bấm sau khi tải xong
            btn.innerText = "⬇️ Tải Ảnh Hóa Đơn Về Máy";
            btn.style.backgroundColor = "#10b981";
            btn.disabled = false;
        }).catch(err => {
            alert("Có lỗi xảy ra khi tạo ảnh, bạn vui lòng kiểm tra lại file ảnh QR nhé!");
            btn.innerText = "⬇️ Tải Ảnh Hóa Đơn Về Máy";
            btn.style.backgroundColor = "#10b981";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
